name: Build Android AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - run: npm install --legacy-peer-deps

      - run: npm run build

      - uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: temurin

      - uses: android-actions/setup-android@v3.2.1

      - name: Install Android SDK 36 and Build Tools
        run: |
          yes | sdkmanager "platforms;android-36" "build-tools;35.0.0" --sdk_root=$ANDROID_SDK_ROOT

      - run: rm -rf android && npx cap add android

      - run: npx cap sync android

      - name: Patch AndroidManifest for maximum device support
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Ensure hardware acceleration is explicit (prevents WebView rendering crash on some devices)
          sed -i 's|android:allowBackup="true"|android:allowBackup="true"\n        android:hardwareAccelerated="true"|' $MANIFEST
          # Add device-support features before Permissions comment
          sed -i 's|<!-- Permissions -->|<!-- Touch/screen features declared optional so TVs, Chromebooks \& non-touch devices are supported -->\n    <uses-feature android:name="android.hardware.touchscreen" android:required="false"/>\n    <uses-feature android:name="android.hardware.faketouch" android:required="false"/>\n    <uses-feature android:name="android.software.leanback" android:required="false"/>\n\n    <!-- Screen size support -->\n    <supports-screens\n        android:smallScreens="true"\n        android:normalScreens="true"\n        android:largeScreens="true"\n        android:xlargeScreens="true"\n        android:anyDensity="true"/>\n\n    <!-- Permissions -->|' $MANIFEST
          echo "=== Patched manifest ===" && cat $MANIFEST

      - name: Fix splash screen theme (postSplashScreenTheme + colors)
        run: |
          RES=android/app/src/main/res/values

          # Write colors.xml — AppTheme references @color/colorPrimary etc. which
          # the Capacitor template never defines, causing ResourceNotFoundException.
          printf '%s\n' \
            '<?xml version="1.0" encoding="utf-8"?>' \
            '<resources>' \
            '    <color name="colorPrimary">#8B4513</color>' \
            '    <color name="colorPrimaryDark">#5C2D0A</color>' \
            '    <color name="colorAccent">#DEB887</color>' \
            '</resources>' > $RES/colors.xml

          # Patch styles.xml — Capacitor template omits postSplashScreenTheme,
          # leaving the activity in Theme.SplashScreen after the splash dismisses.
          # On Android 12+ this crashes BridgeActivity because Theme.SplashScreen
          # lacks the AppCompat window attributes the WebView host needs.
          sed -i 's|<item name="android:background">@drawable/splash</item>|<item name="windowSplashScreenBackground">@color/colorPrimary</item>|' $RES/styles.xml
          sed -i 's|<style name="AppTheme.NoActionBarLaunch" parent="Theme.SplashScreen">|<style name="AppTheme.NoActionBarLaunch" parent="Theme.SplashScreen">\n        <item name="postSplashScreenTheme">@style/AppTheme.NoActionBar</item>|' $RES/styles.xml

          echo "=== styles.xml ===" && cat $RES/styles.xml
          echo "=== colors.xml ===" && cat $RES/colors.xml

      - name: Patch SDK versions in variables.gradle
        run: |
          sed -i "s/compileSdkVersion = .*/compileSdkVersion = 36/" android/variables.gradle
          sed -i "s/targetSdkVersion = .*/targetSdkVersion = 36/" android/variables.gradle
          sed -i "s/minSdkVersion = .*/minSdkVersion = 24/" android/variables.gradle
          sed -i 's/buildToolsVersion = .*/buildToolsVersion = "35.0.0"/' android/variables.gradle

      - name: Bump versionCode and versionName
        run: |
          VERSION_CODE=$((GITHUB_RUN_NUMBER + 100))
          VERSION_NAME=$(node -p "require('./package.json').version")
          # Patch app/build.gradle directly (Capacitor puts versionCode/versionName there)
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle
          echo "=== Version check ===" && grep -E "versionCode|versionName" android/app/build.gradle

      - name: Generate App Icons with ImageMagick
        run: |
          sudo apt-get install -y imagemagick -q
          BASE=android/app/src/main/res
          generate_icon() {
            SIZE=$1
            FOLDER=$2
            mkdir -p $BASE/$FOLDER
            convert -size ${SIZE}x${SIZE} xc:none \
              \( -size ${SIZE}x${SIZE} xc:none \
                -fill "#8B4513" \
                -draw "rectangle 0,$(($SIZE*60/100)) ${SIZE},$(($SIZE*68/100))" \
              \) -composite \
              \( -size ${SIZE}x${SIZE} xc:none \
                -fill "#A0522D" \
                -draw "rectangle $(($SIZE/8)),$(($SIZE*42/100)) $(($SIZE*7/8)),$(($SIZE*50/100))" \
              \) -composite \
              \( -size ${SIZE}x${SIZE} xc:none \
                -fill "#CD853F" \
                -draw "rectangle $(($SIZE/4)),$(($SIZE*26/100)) $(($SIZE*3/4)),$(($SIZE*34/100))" \
              \) -composite \
              \( -size ${SIZE}x${SIZE} xc:none \
                -fill "#DEB887" \
                -draw "rectangle $(($SIZE*3/8)),$(($SIZE*10/100)) $(($SIZE*5/8)),$(($SIZE*18/100))" \
              \) -composite \
              -type TrueColor PNG32:$BASE/$FOLDER/ic_launcher.png
            cp $BASE/$FOLDER/ic_launcher.png $BASE/$FOLDER/ic_launcher_round.png
          }
          generate_icon 48 mipmap-mdpi
          generate_icon 72 mipmap-hdpi
          generate_icon 96 mipmap-xhdpi
          generate_icon 144 mipmap-xxhdpi
          generate_icon 192 mipmap-xxxhdpi

      - run: chmod +x android/gradlew

      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release-key.jks
            echo "STORE_PASSWORD=$STORE_PASSWORD" >> $GITHUB_ENV
            echo "KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV
            echo "KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
            echo "HAS_KEYSTORE=true" >> $GITHUB_ENV
            echo "Keystore configured"
          else
            echo "No keystore secret – build will use debug signing"
            echo "HAS_KEYSTORE=false" >> $GITHUB_ENV
          fi

      - name: Build & Sign AAB
        run: |
          if [ "$HAS_KEYSTORE" = "true" ]; then
            cd android && ./gradlew bundleRelease -x lint \
              -Pandroid.injected.signing.store.file=$(pwd)/app/release-key.jks \
              -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            cd android && ./gradlew bundleRelease -x lint
          fi

      - uses: actions/upload-artifact@v4.6.1
        continue-on-error: true
        with:
          name: jenga-master-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Deploy to Play Store internal track
        if: github.ref == 'refs/heads/main'
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.ibsam588lgtm.jengamaster
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          tracks: internal
          status: draft
